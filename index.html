<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mizael Ferreira | Portfólio React</title>
  <!-- Fonte de ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- React e ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel para JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ffffff; color: #2c3e50; line-height: 1.5; display: flex; flex-direction: column; min-height: 100vh; }
    header { background-color: #ffffff; border-bottom: 1px solid #e0f2f1; padding: 1rem 0; position: sticky; top: 0; z-index: 100; }
    .header-container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .logo { display: flex; align-items: center; gap: 0.5rem; }
    .iniciais { background-color: #00BCD4; color: white; font-weight: bold; font-size: 1.2rem; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
    .nome { font-weight: 600; font-size: 1.2rem; color: #00838F; }
    nav { display: flex; gap: 2rem; }
    nav a { text-decoration: none; color: #006064; font-weight: 500; transition: color 0.2s; }
    nav a:hover { color: #00BCD4; }
    main { flex: 1; max-width: 1100px; width: 100%; margin: 0 auto; padding: 2rem 1.5rem; }
    .hero { padding: 3rem 0 4rem; }
    .hero-content { max-width: 700px; }
    .foto-perfil { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 3px solid #00BCD4; box-shadow: 0 4px 6px rgba(0, 188, 212, 0.2); margin-bottom: 1.5rem; }
    .saudacao { font-size: 1.2rem; color: #00838F; margin-bottom: 0.5rem; }
    .hero h1 { font-size: 3.5rem; font-weight: 700; color: #006064; margin-bottom: 1rem; line-height: 1.2; }
    .descricao { font-size: 1.2rem; color: #546E7A; margin-bottom: 2rem; }
    .botoes { display: flex; gap: 1rem; flex-wrap: wrap; }
    .btn { display: inline-block; padding: 0.8rem 1.8rem; border-radius: 30px; text-decoration: none; font-weight: 600; transition: all 0.2s; }
    .btn-primario { background-color: #00BCD4; color: white; box-shadow: 0 4px 6px rgba(0,188,212,0.2); }
    .btn-primario:hover { background-color: #0097A7; transform: translateY(-2px); }
    .btn-secundario { background-color: #E1F5FE; color: #00838F; }
    .btn-secundario:hover { background-color: #B3E5FC; }
    h2 { font-size: 2rem; color: #006064; margin-bottom: 0.5rem; }
    .subtitulo { color: #78909C; margin-bottom: 2rem; }
    .projetos-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
    .card { background: white; border: 1px solid #e0f2f1; border-radius: 16px; padding: 1.8rem; box-shadow: 0 6px 12px rgba(0,0,0,0.02); transition: transform 0.2s, box-shadow 0.2s; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px rgba(0,188,212,0.08); border-color: #B2EBF2; }
    .card h3 { font-size: 1.4rem; color: #00838F; margin-bottom: 0.8rem; }
    .card p { color: #546E7A; margin-bottom: 1.5rem; }
    .links-projeto { display: flex; gap: 1rem; }
    .card a { display: inline-flex; align-items: center; gap: 6px; background-color: #E1F5FE; color: #00838F; padding: 0.5rem 1.2rem; border-radius: 30px; text-decoration: none; font-weight: 500; transition: background 0.2s; }
    .card a:hover { background-color: #B3E5FC; }
    .contato-cards { display: flex; flex-wrap: wrap; gap: 1.5rem; margin-top: 2rem; }
    .contato-card { background: #F7FDFF; border: 1px solid #B2EBF2; border-radius: 40px; padding: 0.9rem 2rem; display: inline-flex; align-items: center; gap: 12px; text-decoration: none; color: #00838F; font-weight: 500; transition: all 0.2s; }
    .contato-card i { font-size: 1.3rem; color: #00BCD4; }
    .contato-card:hover { background: #E1F5FE; border-color: #00BCD4; }
    footer { text-align: center; padding: 2rem 0; color: #78909C; border-top: 1px solid #e0f2f1; margin-top: 2rem; }
    @media (max-width: 600px) { .header-container { flex-direction: column; gap: 1rem; } nav { gap: 1.5rem; } .hero h1 { font-size: 2.5rem; } .botoes { flex-direction: column; align-items: flex-start; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    function Header() {
      return (
        <header>
          <div className="header-container">
            <div className="logo">
              <span className="iniciais">MF</span>
              <span className="nome">Mizael Ferreira</span>
            </div>
            <nav>
              <a href="#home">Home</a>
              <a href="#projetos">Projetos</a>
              <a href="#contato">Contato</a>
            </nav>
          </div>
        </header>
      );
    }

    function Home() {
      return (
        <section id="home" className="hero">
          <div className="hero-content">
            <img src="https://i.ibb.co/5PMxkNG/1775914403198.png" alt="Foto de Mizael Ferreira" className="foto-perfil" />
            <p className="saudacao">Olá, eu sou</p>
            <h1>Mizael Ferreira</h1>
            <p className="descricao">
              Estudante de Tecnologia em Sistemas para Internet (EAD-UAPI) no polo de Nazaré do Piauí - PI.
            </p>
            <div className="botoes">
              <a href="#projetos" className="btn btn-primario">Ver Meus Projetos</a>
              <a href="#contato" className="btn btn-secundario">Entrar em Contato</a>
            </div>
          </div>
        </section>
      );
    }

    function Projetos() {
      const projetos = [
        { id: 1, titulo: 'Atividade 1 JavaScript', descricao: 'Primeira atividade prática: manipulação de DOM, eventos e lógica de programação.', repositorio: 'https://github.com/TakiHz/Atividade-1-JavaScript' },
        { id: 2, titulo: 'Atividade 2 JavaScript', descricao: 'Segunda atividade: funções assíncronas, consumo de API e tratamento de dados.', repositorio: 'https://github.com/TakiHz/Atividade-2-JavaScript' }
      ];

      return (
        <section id="projetos">
          <h2>Meus Projetos</h2>
          <p className="subtitulo">Atividades desenvolvidas na disciplina</p>
          <div className="projetos-container">
            {projetos.map(projeto => (
              <div className="card" key={projeto.id}>
                <h3>{projeto.titulo}</h3>
                <p>{projeto.descricao}</p>
                <div className="links-projeto">
                  <a href={projeto.repositorio} target="_blank" rel="noopener noreferrer">
                    <i className="fab fa-github"></i> Ver no GitHub
                  </a>
                </div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    function Contato() {
      return (
        <section id="contato">
          <h2>Contato</h2>
          <div className="contato-cards">
            <a href="https://www.instagram.com/mizael.ferreira_" target="_blank" rel="noopener noreferrer" className="contato-card">
              <i className="fab fa-instagram"></i> <span>Instagram</span>
            </a>
            <a href="https://wa.me/558994712994" target="_blank" rel="noopener noreferrer" className="contato-card">
              <i className="fab fa-whatsapp"></i> <span>WhatsApp</span>
            </a>
            <a href="mailto:talix080@gmail.com" className="contato-card">
              <i className="far fa-envelope"></i> <span>E-mail</span>
            </a>
          </div>
        </section>
      );
    }

    function App() {
      return (
        <div>
          <Header />
          <main>
            <Home />
            <Projetos />
            <Contato />
          </main>
          <footer>
            <p>&copy; 2026 Mizael Ferreira</p>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
